<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Squircle Background (Vibrant Purple) -->
  <rect width="512" height="512" rx="128" fill="#a855f7" />
  
  <!-- Icon Paths (White with rounded ends) -->
  <g stroke="#ffffff" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Center Vertical Line -->
    <line x1="256" y1="140" x2="256" y2="372" />
    
    <!-- Left Horizontal Stem -->
    <line x1="190" y1="256" x2="256" y2="256" />
    
    <!-- Left Horizontal Loop -->
    <circle cx="166" cy="256" r="24" />
    
    <!-- Lower Vertical Stem -->
    <line x1="216" y1="256" x2="216" y2="288" />
    
    <!-- Lower Loop -->
    <circle cx="216" cy="312" r="24" />
    
    <!-- Right Horizontal Dash -->
    <line x1="296" y1="256" x2="356" y2="256" />
  </g>
</svg>